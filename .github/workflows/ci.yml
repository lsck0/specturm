name: CI

on:
  workflow_dispatch:
  # pull_request:
  #   branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev \
          clang mold mingw-w64 ffmpeg

      - name: Install SDL3
        run: |
          cmake -S ./vendor/sdl -B ./vendor/sdl/build-linux-x86_64/ -GNinja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DSDL_SHARED=OFF -DSDL_STATIC=ON
          cmake --build ./vendor/sdl/build-linux-x86_64/ --config Release -- -j $(nproc)
          sudo cmake --install ./vendor/sdl/build-linux-x86_64/

      - name: Bootstrap build system
        run: clang build.c -o build -std=c23 -fenable-matrix -I./src -lm -lSDL3

      - name: Run tests
        run: ./build run test
